# .github/workflows/trigger-gce-build.yml
name: Trigger GCE Build on Strapi Update

# 1. 触发方式：监听 repository_dispatch 事件，类型为 'strapi-update'
on:
  repository_dispatch:
    types: [strapi-update]

jobs:
  run-build-on-gce:
    # 2. 指定运行器：使用我们刚配置好的自托管runner
    runs-on: [self-hosted, linux, gce]  # 'gce' 标签可选，但推荐添加以便于区分

    # 3. 定义在自托管runner上执行的步骤
    steps:
      # 重要：我们不需要 actions/checkout，因为代码已经在 GCE 上了。

      - name: Run the build script on GCE
        # 这个命令将在您的 GCE 实例上执行
        # 请确保 /home/your-username/astro-vitesse-site/build.sh 有执行权限 (chmod +x)
        run: |
          cd /home/astro-vitesse-site
          ./build.sh

      - name: (可选) 重新加载 Nginx 或通知服务
        # 如果您需要让 Nginx 重新加载配置，可以在这里添加命令
        run: sudo systemctl reload nginx
        # 注意：如果您的 Nginx 配置没有改动，这一步可能不是必须的
